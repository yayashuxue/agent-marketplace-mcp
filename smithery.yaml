# Smithery deployment config for agent-marketplace-mcp
# https://smithery.ai/docs/build/deployments

runtime: typescript
startCommand:
  type: stdio
  command: node
  args: ["bin/agent-marketplace-mcp.js"]
configSchema:
  type: object
  properties:
    AGENT_MARKETPLACE_URL:
      type: string
      title: Proxy URL
      description: Base URL of the agent-marketplace-proxy. Defaults to the hosted instance.
      default: https://agent-marketplace-proxy.vercel.app
    X402_NETWORK:
      type: string
      title: x402 Network
      enum: [base, base-sepolia]
      default: base
    AGENT_MARKETPLACE_CONFIG_DIR:
      type: string
      title: Local session directory
      description: Where to store the spender session file (default ~/.agent-marketplace).
    AGENT_MARKETPLACE_SPENDER_KEY:
      type: string
      title: Spender private key (headless / CI)
      description: 0x-prefixed 32-byte hex. Bypasses wallet_connect when set.
      format: password
